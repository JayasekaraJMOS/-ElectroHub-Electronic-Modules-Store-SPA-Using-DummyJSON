<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <filter id="outline" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Dilate creates an outline effect, and flood colors it black -->
      <feMorphology in="SourceAlpha" result="expanded" operator="dilate" radius="0.5"></feMorphology>
      <feFlood flood-color="black" flood-opacity="1"></feFlood>
      <feComposite in2="expanded" operator="in" result="outline"></feComposite>
      <feMerge>
        <feMergeNode in="outline"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>
  <!-- Draw the trimmed PNG scaled inside by a bit to give room for the border -->
  <image href="data:image/png;base64," x="1" y="1" width="30" height="30" filter="url(#outline)"></image>
</svg>